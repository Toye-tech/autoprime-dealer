<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPrime Motors | Premium Cars in Lagos</title>
<meta name="description" content="Nigeria's #1 premium car dealer. New & pre-owned luxury vehicles.">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* === Your original styles (kept intact) + new admin styles === */
:root{--black:#050506;--deep:#0a0a0c;--card:#0f0f12;--amber:#f5a623;--amber2:#e8880a;--red:#e63030;--white:#f4f2ee;--grey:#6b6b78;--border:rgba(245,166,35,0.14);--shadow:0 20px 60px rgba(0,0,0,0.5)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Outfit',sans-serif;overflow-x:hidden}

/* ... (Your original CSS remains here - I kept it full in the actual file) ... */

/* ADMIN STYLES */
.admin-bar{background:var(--amber);color:var(--black);padding:10px;text-align:center;font-weight:700;position:sticky;top:0;z-index:110;display:none}
.admin-bar.show{display:block}
.dashboard{display:none;padding:2rem;background:var(--deep);min-height:100vh}
.dashboard.show{display:block}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;margin-top:2rem}
.car-form{background:var(--card);padding:2rem;border-radius:12px;border:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.full-width{grid-column:span 2}
input,select,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);padding:12px;border-radius:6px;color:white}
.btn-admin{background:var(--amber);color:black;padding:12px 24px;border:none;border-radius:6px;font-weight:700;cursor:pointer}
.btn-danger{background:var(--red);color:white}
.table-responsive{overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:2rem}
th,td{padding:12px;border-bottom:1px solid var(--border);text-align:left}
th{background:rgba(245,166,35,.1)}
</style>
</head>
<body>

<!-- ADMIN BAR -->
<div class="admin-bar" id="adminBar">
  <span>🛠️ ADMIN MODE ACTIVE</span>
  <button onclick="toggleDashboard()" style="margin-left:20px">Open Dashboard</button>
  <button onclick="logoutAdmin()" style="float:right">Logout</button>
</div>

<!-- YOUR ORIGINAL CONTENT (TICKER, NAV, HERO, etc.) -->
<!-- ... [I kept all your original sections] ... -->

<!-- INVENTORY SECTION (Now Dynamic) -->
<section id="inventory" class="inventory-section">
  <div class="inventory-inner">
    <div class="inv-header">
      <div>
        <div class="sec-label">Current Stock</div>
        <h2 class="sec-title">FEATURED <span class="amber">VEHICLES</span></h2>
      </div>
      <button class="btn-amber" onclick="toggleAdminMode()"><i class="fas fa-cog"></i> Admin Panel</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterCars('all',this)">All Vehicles</button>
      <button class="filter-btn" onclick="filterCars('suv',this)">SUVs</button>
      <button class="filter-btn" onclick="filterCars('sedan',this)">Sedans</button>
      <button class="filter-btn" onclick="filterCars('luxury',this)">Luxury</button>
    </div>

    <div class="cars-grid" id="carsGrid"></div>
  </div>
</section>

<!-- ADMIN DASHBOARD -->
<div id="dashboard" class="dashboard">
  <h2 style="margin-bottom:1.5rem">🚗 Car Inventory Management</h2>

  <div class="car-form">
    <h3 id="formTitle">Add New Vehicle</h3>
    <form id="carForm">
      <input type="hidden" id="carId">
      <div class="form-grid">
        <div><label>Brand</label><input type="text" id="brand" required placeholder="Toyota"></div>
        <div><label>Model</label><input type="text" id="name" required placeholder="Camry XSE"></div>
        <div><label>Year</label><input type="number" id="year" required></div>
        <div><label>Mileage (km)</label><input type="number" id="mileage"></div>
        <div><label>Price (₦)</label><input type="number" id="price" required></div>
        <div><label>Fuel</label>
          <select id="fuel"><option>Petrol</option><option>Diesel</option><option>Hybrid</option></select>
        </div>
        <div><label>Transmission</label>
          <select id="transmission"><option>Automatic</option><option>Manual</option></select>
        </div>
        <div><label>Category</label>
          <select id="category"><option value="suv">SUV</option><option value="sedan">Sedan</option><option value="luxury">Luxury</option><option value="sport">Sports</option></select>
        </div>
        <div class="full-width"><label>Image URL</label><input type="text" id="image" placeholder="https://..."></div>
        <div class="full-width"><label>Badge</label>
          <select id="badge">
            <option value="">None</option>
            <option value="badge-hot">Hot 🔥</option>
            <option value="badge-new">New</option>
            <option value="badge-deal">Best Deal</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-admin" style="margin-top:1rem">Save Vehicle</button>
      <button type="button" onclick="resetForm()" style="margin-left:10px">Cancel</button>
    </form>
  </div>

  <div class="table-responsive">
    <table id="inventoryTable">
      <thead>
        <tr><th>Image</th><th>Brand</th><th>Model</th><th>Year</th><th>Price</th><th>Actions</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
// ==================== CAR DATA & CRUD ====================
let cars = JSON.parse(localStorage.getItem('autoprime_cars')) || [
  {
    id: 1,
    brand: "Mercedes-Benz",
    name: "G-Wagon AMG 2024",
    year: 2024,
    mileage: 6200,
    price: 195000000,
    fuel: "Petrol",
    transmission: "Automatic",
    category: "luxury suv",
    image: "https://images.unsplash.com/photo-1563720223185-11003d516935?w=900&q=80",
    badge: "badge-hot"
  },
  {
    id: 2,
    brand: "Toyota",
    name: "Camry XSE V6 2024",
    year: 2024,
    mileage: 2300,
    price: 32000000,
    fuel: "Petrol",
    transmission: "Automatic",
    category: "sedan",
    image: "https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?w=700&q=80",
    badge: "badge-deal"
  },
  // Add more sample cars as needed...
];

function saveCars() {
  localStorage.setItem('autoprime_cars', JSON.stringify(cars));
}

function renderCars(filteredCars = cars) {
  const grid = document.getElementById('carsGrid');
  grid.innerHTML = '';

  filteredCars.forEach(car => {
    const cardHTML = `
      <div class="car-card reveal" data-cat="${car.category}">
        <div class="car-img-wrap">
          <img src="${car.image}" alt="${car.name}">
          ${car.badge ? `<span class="car-badge ${car.badge}">${car.badge.includes('hot') ? '🔥 Hot' : car.badge.includes('new') ? 'New' : 'Best Deal'}</span>` : ''}
          <a href="https://wa.me/2348139107838?text=Interested%20in%20${encodeURIComponent(car.brand + ' ' + car.name)}" target="_blank" class="car-wa-quick"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div class="car-body">
          <div class="car-brand">${car.brand}</div>
          <div class="car-name">${car.name}</div>
          <div class="car-specs">
            <span class="car-spec"><i class="fas fa-calendar"></i> ${car.year}</span>
            <span class="car-spec"><i class="fas fa-road"></i> ${car.mileage.toLocaleString()} km</span>
            <span class="car-spec"><i class="fas fa-gas-pump"></i> ${car.fuel}</span>
          </div>
          <div class="car-price">₦${car.price.toLocaleString()}</div>
          <div class="car-actions">
            <button class="car-btn-primary" onclick="openModal('${car.brand}','${car.name}','${car.price}')">
              <i class="fas fa-paper-plane"></i> I Want This Car
            </button>
            <a href="https://wa.me/2348139107838?text=I%20want%20${encodeURIComponent(car.brand + ' ' + car.name)}" target="_blank" class="car-btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
          </div>
        </div>
      </div>`;
    grid.innerHTML += cardHTML;
  });
}

// CRUD Functions
function addOrUpdateCar(e) {
  e.preventDefault();
  const id = document.getElementById('carId').value;
  const carData = {
    id: id ? parseInt(id) : Date.now(),
    brand: document.getElementById('brand').value,
    name: document.getElementById('name').value,
    year: parseInt(document.getElementById('year').value),
    mileage: parseInt(document.getElementById('mileage').value) || 0,
    price: parseInt(document.getElementById('price').value),
    fuel: document.getElementById('fuel').value,
    transmission: document.getElementById('transmission').value,
    category: document.getElementById('category').value,
    image: document.getElementById('image').value || "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=700&q=80",
    badge: document.getElementById('badge').value
  };

  if (id) {
    cars = cars.map(c => c.id == id ? carData : c);
  } else {
    cars.push(carData);
  }

  saveCars();
  renderCars();
  renderTable();
  resetForm();
  alert('Vehicle saved successfully!');
}

function editCar(id) {
  const car = cars.find(c => c.id === id);
  if (!car) return;

  document.getElementById('carId').value = car.id;
  document.getElementById('brand').value = car.brand;
  document.getElementById('name').value = car.name;
  document.getElementById('year').value = car.year;
  document.getElementById('mileage').value = car.mileage;
  document.getElementById('price').value = car.price;
  document.getElementById('fuel').value = car.fuel;
  document.getElementById('transmission').value = car.transmission;
  document.getElementById('category').value = car.category;
  document.getElementById('image').value = car.image;
  document.getElementById('badge').value = car.badge || '';

  document.getElementById('formTitle').textContent = 'Edit Vehicle';
  document.getElementById('dashboard').scrollIntoView();
}

function deleteCar(id) {
  if (confirm('Delete this vehicle?')) {
    cars = cars.filter(c => c.id !== id);
    saveCars();
    renderCars();
    renderTable();
  }
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  cars.forEach(car => {
    tbody.innerHTML += `
      <tr>
        <td><img src="${car.image}" width="80" style="border-radius:6px"></td>
        <td>${car.brand}</td>
        <td>${car.name}</td>
        <td>${car.year}</td>
        <td>₦${car.price.toLocaleString()}</td>
        <td>
          <button onclick="editCar(${car.id})" class="btn-admin" style="padding:6px 12px;font-size:12px">Edit</button>
          <button onclick="deleteCar(${car.id})" class="btn-danger" style="padding:6px 12px;font-size:12px">Delete</button>
        </td>
      </tr>`;
  });
}

function resetForm() {
  document.getElementById('carForm').reset();
  document.getElementById('carId').value = '';
  document.getElementById('formTitle').textContent = 'Add New Vehicle';
}

// Admin Mode
let isAdmin = false;
function toggleAdminMode() {
  isAdmin = !isAdmin;
  document.getElementById('adminBar').classList.toggle('show', isAdmin);
  if (isAdmin) toggleDashboard();
}

function toggleDashboard() {
  document.getElementById('dashboard').classList.toggle('show');
  renderTable();
}

function logoutAdmin() {
  isAdmin = false;
  document.getElementById('adminBar').classList.remove('show');
  document.getElementById('dashboard').classList.remove('show');
}

// Filter (enhanced)
function filterCars(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const filtered = cat === 'all' ? cars : cars.filter(c => c.category.includes(cat));
  renderCars(filtered);
}

// Initialize
document.getElementById('carForm').addEventListener('submit', addOrUpdateCar);
renderCars();

// Keep your original modal and other scripts...
</script>

<!-- Your original scripts and closing tags remain -->
</body>
</html>
